name: Deploy Site to S3 + CloudFront (staging)

on:
  push:
    branches:
      - staging

permissions:
  id-token: write
  contents: read

env:
  SITE_URL: https://staging.amigoviolao.com
  NEXT_PUBLIC_FORMSPREE_ENDPOINT: ${{ secrets.NEXT_PUBLIC_FORMSPREE_ENDPOINT }}
  NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build site (static export + sitemap)
        run: npm run build

      - name: Configure AWS credentials (OIDC — sem chaves estáticas)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::291768628850:role/github-actions-deploy-role
          aws-region: sa-east-1

      - name: Deploy to S3 (assets, cache 1 ano)
        run: |
          aws s3 sync out/ s3://amigo-violao-website-staging/ \
            --delete \
            --cache-control "public, max-age=31536000" \
            --exclude "*.html"

      - name: Deploy to S3 (HTML, cache 1 hora)
        run: |
          aws s3 sync out/ s3://amigo-violao-website-staging/ \
            --exclude "*" \
            --include "*.html" \
            --cache-control "public, max-age=3600"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
